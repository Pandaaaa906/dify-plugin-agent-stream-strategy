<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <circle cx="64" cy="64" r="60" fill="#0f172a"/>

  <!-- 流动曲线 - 三层 -->
  <path d="M20 64 Q44 32, 64 64 T108 64" fill="none" stroke="url(#flow)" stroke-width="4" stroke-linecap="round" opacity="0.9">
    <animate attributeName="d" values="M20 64 Q44 32, 64 64 T108 64;M20 64 Q44 96, 64 64 T108 64;M20 64 Q44 32, 64 64 T108 64" dur="3s" repeatCount="indefinite"/>
  </path>

  <path d="M20 64 Q44 40, 64 64 T108 64" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <animate attributeName="d" values="M20 64 Q44 40, 64 64 T108 64;M20 64 Q44 88, 64 64 T108 64;M20 64 Q44 40, 64 64 T108 64" dur="3s" begin="0.2s" repeatCount="indefinite"/>
  </path>

  <path d="M20 64 Q44 48, 64 64 T108 64" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <animate attributeName="d" values="M20 64 Q44 48, 64 64 T108 64;M20 64 Q44 80, 64 64 T108 64;M20 64 Q44 48, 64 64 T108 64" dur="3s" begin="0.4s" repeatCount="indefinite"/>
  </path>

  <!-- 中心圆点 -->
  <circle cx="64" cy="64" r="8" fill="url(#flow)">
    <animate attributeName="r" values="8;10;8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- 三个小点代表 blocks -->
  <circle cx="44" cy="52" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="84" cy="52" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="64" cy="88" r="4" fill="#10b981" opacity="0.8"/>
</svg>